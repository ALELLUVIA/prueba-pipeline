name: Primer pipeline
on: [push]
jobs:
  ejecutar-pruebas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar Pytest
        run: pip install pytest
      - name: Correr Pruebas
        run: pytest test_app.py